{% extends "layout.html" %}

{% block title %}
Login

{% block content %}

<h1>Login</h1>

<form method="POST">

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">
        Login
    </button>

</form>

{% endblock %}
